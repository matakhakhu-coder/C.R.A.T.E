name: C.R.A.T.E. Substrate Preflight and Compilation Validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  substrate-preflight:
    name: Substrate Preflight and Engineering Asset Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run substrate preflight check
        run: npm run launch

      - name: Run compilation validation
        run: npm run build

      - name: Report build artefact sizes
        run: |
          echo "Build artefact summary"
          du -sh dist/assets/* 2>/dev/null || echo "No artefacts in dist/assets"
