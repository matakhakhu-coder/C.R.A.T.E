<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <title>C.R.A.T.E.</title>

    <!-- Google Fonts: Nunito (headings) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-cr-slate text-cr-cream font-body">

    <!-- Primary app mount — single innerHTML write point per two-function contract -->
    <div id="app"></div>

    <!-- Global toast notification — rendered once, controlled by showToast() in init() -->
    <div
      id="cr-toast"
      class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50
             px-5 py-3 rounded-2xl shadow-card-hover font-body text-sm
             font-medium text-cr-cream pointer-events-none
             transition-all duration-300"
    ></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
